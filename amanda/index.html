<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Why I Love You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Caveat:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #080c18;
      --navy-mid:  #0d1225;
      --gold:      #c9a84c;
      --gold-light:#e8cc80;
      --gold-dim:  #7a6230;
      --gold-dark: #3a2f14;
      --text:      #e8dfc8;
      --text-dim:  #9a8f78;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--navy);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── STARS ── */
    #stars-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .scene {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 3rem;
    }

    /* ── FRAME ── */
    .frame {
      position: fixed;
      inset: 16px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 6px;
      pointer-events: none;
      z-index: 0;
    }
    .frame-gem {
      position: fixed;
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.8;
    }

    /* ── HEADER ── */
    .site-header {
      text-align: center;
      margin-bottom: 0.6rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }
    .site-header h1 {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      color: var(--gold);
      letter-spacing: 0.02em;
      line-height: 1.05;
    }

    /* ── GOLD RULE ── */
    .gold-rule {
      width: clamp(120px, 40vw, 200px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.4rem auto 2.4rem;
      opacity: 0;
      animation: fadeIn 1s ease 0.6s forwards;
    }

    /* ── REASON CARD ── */
    .reason-wrap {
      width: min(420px, 92vw);
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.8s forwards;
    }

    .reason-card {
      text-align: center;
      padding: 2rem 1.6rem;
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 4px;
      background: rgba(201,168,76,0.04);
      width: 100%;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .reason-card.hidden {
      opacity: 0;
      transform: translateY(12px);
    }
    .reason-card.empty {
      border-color: transparent;
      background: transparent;
    }

    .reason-num {
      display: block;
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.9rem;
      font-style: normal;
      font-weight: 400;
    }
    .reason-text {
      font-size: clamp(1.15rem, 4vw, 1.4rem);
      font-style: italic;
      font-weight: 300;
      line-height: 1.75;
      color: var(--text);
    }

    /* ── BUTTON ── */
    .btn-wrap {
      opacity: 0;
      animation: fadeUp 1s ease 1s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .press-btn {
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 3px;
      padding: clamp(14px, 3vw, 18px) clamp(48px, 12vw, 80px);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1rem, 3.5vw, 1.25rem);
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .press-btn:hover { background: var(--gold-light); }
    .press-btn:active { transform: scale(0.96); }
    .press-btn:disabled {
      background: var(--gold-dark);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.4);
      cursor: not-allowed;
      transform: none;
    }

    .cooldown-txt {
      font-size: clamp(0.8rem, 2.5vw, 0.9rem);
      font-style: italic;
      color: var(--gold-dim);
      letter-spacing: 0.06em;
      min-height: 1.2rem;
      text-align: center;
    }

    /* ── FOOTER ── */
    .site-footer {
      margin-top: 3rem;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }
    .site-footer p {
      font-size: clamp(0.6rem, 1.8vw, 0.72rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    /* ── FLOATING DIAMOND ── */
    .floaty {
      position: fixed;
      pointer-events: none;
      color: var(--gold);
      font-size: 14px;
      z-index: 20;
      animation: riseUp 1.2s ease forwards;
    }
    @keyframes riseUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-70px) scale(1.6); }
    }

    /* ── UTILS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

<!-- FRAME GEMS -->
<div class="frame"></div>
<div class="frame-gem" style="top:20px;left:20px;"></div>
<div class="frame-gem" style="top:20px;right:20px;"></div>
<div class="frame-gem" style="bottom:20px;left:20px;"></div>
<div class="frame-gem" style="bottom:20px;right:20px;"></div>

<!-- STARS -->
<canvas id="stars-canvas"></canvas>

<!-- MAIN -->
<main class="scene">

  <header class="site-header">
    <h1>Why I Love You</h1>
  </header>

  <div class="gold-rule"></div>

  <div class="reason-wrap">
    <div class="reason-card empty" id="card">
      <span class="reason-num" id="reason-num"></span>
      <span class="reason-text" id="reason-text"></span>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="press-btn" id="btn">Press</button>
    <div class="cooldown-txt" id="cooldown-txt"></div>
  </div>

  <footer class="site-footer">

  </footer>

</main>

<script>
  /* ── STARS ── */
  (function () {
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); buildStars(); });

    function buildStars() {
      stars = [];
      const count = Math.floor((canvas.width * canvas.height) / 3500);
      for (let i = 0; i < count; i++) {
        stars.push({
          x:  Math.random() * canvas.width,
          y:  Math.random() * canvas.height,
          r:  Math.random() * 1.2 + 0.2,
          a:  Math.random(),
          da: (Math.random() - 0.5) * 0.007
        });
      }
    }
    buildStars();

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.a += s.da;
        if (s.a <= 0.05 || s.a >= 1) s.da *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,210,180,${s.a})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* ── REASONS ── */
  const reasons = [
    "The way your eyes light up when you talk about something you love, it makes everything else disappear.",
    "How you make even the most ordinary moments feel like they actually mean something.",
    "The sound of your laugh. Genuinely, it is my favorite sound in the entire world.",
    "How you love so deeply and so fiercely, without ever making it feel like a burden.",
    "The way being with you feels like the only place I have ever truly belonged.",
    "Being the Jedi Princess you are <3.",
    "You showed me what natural true love actually is.",
    "Our little jabs at eachother on all the game-based rides <3",
    "You are the most genuine woman ive ever known",
    "Your love for Disney",
    "Your touch makes the world around me go silent",
    "That smirk and little moan you make ;)",
    "The way we can say nothing for a while and it still feels like enough.",
    "The way we clicked immediately at Splitsville",
    "The fact that out of everywhere I could have ended up, I ended up with you.",
    "The way you catch me staring at you",
    "How normal it feels to have you in my arms.",
    "The way you look at me when i move your hair behind your ear <3",
    "The way being loved by you feels like the greatest thing that's ever happened to me."
  
  ];

  const COOLDOWN_MS  = 2 * 60 * 60 * 1000;
  const STORAGE_KEY  = 'wily_v2_last_press';
  let lastIdx = -1;

  function getRemainingCooldown() {
    const last = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
    return last ? Math.max(0, COOLDOWN_MS - (Date.now() - last)) : 0;
  }

  function formatRemaining(ms) {
    const s = Math.ceil(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `return in ${h}h ${m}m`;
    if (m > 0) return `return in ${m}m ${sec}s`;
    return `return in ${sec}s`;
  }

  function spawnFloaty(btn) {
    const el = document.createElement('div');
    el.className = 'floaty';
    el.textContent = '♦';
    const br = btn.getBoundingClientRect();
    el.style.left = (br.left + br.width / 2 - 7) + 'px';
    el.style.top  = (br.top - 10) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }

  function pressIt() {
    if (getRemainingCooldown() > 0) return;
    localStorage.setItem(STORAGE_KEY, Date.now().toString());

    let idx;
    do { idx = Math.floor(Math.random() * reasons.length); }
    while (idx === lastIdx && reasons.length > 1);
    lastIdx = idx;

    const card = document.getElementById('card');
    card.classList.add('hidden');

    setTimeout(() => {
      document.getElementById('reason-num').textContent = '— reason ' + (idx + 1) + ' —';
      document.getElementById('reason-text').textContent = reasons[idx];
      card.classList.remove('empty');
      card.classList.remove('hidden');
    }, 450);

    spawnFloaty(document.getElementById('btn'));
    startCooldown();
  }

  function startCooldown() {
    const btn = document.getElementById('btn');
    const txt = document.getElementById('cooldown-txt');
    btn.disabled = true;
    const iv = setInterval(() => {
      const rem = getRemainingCooldown();
      if (rem <= 0) {
        clearInterval(iv);
        btn.disabled = false;
        txt.textContent = '';
      } else {
        txt.textContent = formatRemaining(rem);
      }
    }, 1000);
    txt.textContent = formatRemaining(getRemainingCooldown());
  }

  document.getElementById('btn').addEventListener('click', pressIt);

  (function init() {
    if (getRemainingCooldown() > 0) startCooldown();
  })();
</script>
</body>
</html>
